<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>be better — 18 Conquistas</title>
<style>
:root{
  --sf:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display',sans-serif;
  --roboto:'Roboto Flex','Roboto',system-ui,sans-serif;
  --serif:'Newsreader','Georgia',serif;
  --brand:#E8663D;--brand-deep:#C7416B;--brand-soft:#FDE3D6;--accent:#F2A65A;
  --bg:#FFF3EC;--surface:#FFFFFF;--surface-2:#FCE6DA;
  --ink:#3A2230;--ink-2:#8A6A6E;--hair:#F3D6C8;
  --shadow-tint:rgba(199,65,107,.4);
  --cofre-gold:#E8B45A;--cofre-gold-light:#F4D49A;--cofre-gold-deep:#C2902E;
  --studio-bg:#F6E7DD;--studio-ink:#5a3340;
  --ease-spring:cubic-bezier(0.34,1.56,0.64,1);--ease-hig:cubic-bezier(0.32,0.72,0,1);
  --dur-s:.28s;--dur-l:.9s;--dur-theme:.7s;
  --space-2:8px;--space-3:12px;--space-4:16px;--space-5:24px;--space-6:32px;--space-7:48px;
  --radius-l:28px;--radius-m:20px;--radius-s:14px;--radius-pill:999px;
}
body.dark{--brand:#E89160;--brand-deep:#C25E3F;--brand-soft:#2A1F1B;--accent:#F2A65A;--bg:#0E1F1B;--surface:#16322B;--surface-2:#1D403A;--ink:#DCE6E2;--ink-2:#7E9389;--hair:#243D36;--shadow-tint:rgba(232,145,96,.4);--studio-bg:#0A1714;--studio-ink:#a8c5bd;--cofre-gold:#F0C476;--cofre-gold-light:#F7E0AE;--cofre-gold-deep:#E8B45A}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sf);background:var(--studio-bg);color:var(--studio-ink);transition:background var(--dur-theme) ease,color var(--dur-theme) ease;min-height:100vh;padding:var(--space-6) var(--space-5) var(--space-7)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.studio-head{max-width:980px;margin:0 auto var(--space-6);display:flex;align-items:center;gap:var(--space-5);flex-wrap:wrap}
.brand-block{display:flex;align-items:center;gap:var(--space-3)}.brand-mark{width:38px;height:38px;border-radius:12px;background:linear-gradient(160deg,var(--brand),var(--brand-deep));display:grid;place-items:center;box-shadow:0 6px 16px var(--shadow-tint)}.brand-mark svg{width:22px;height:22px}.brand-name{font-weight:680;font-size:19px;letter-spacing:-.02em}.brand-sub{font-size:12.5px;opacity:.6;margin-top:1px}
.spacer{flex:1}.theme-btn{border:0;cursor:pointer;width:42px;height:42px;border-radius:var(--radius-pill);background:rgba(127,127,127,.14);color:inherit;display:grid;place-items:center;transition:transform var(--dur-s) var(--ease-spring)}.theme-btn:active{transform:scale(.9) rotate(-20deg)}.theme-btn svg{width:20px;height:20px}
.stage{max-width:980px;margin:0 auto;display:flex;gap:var(--space-7);justify-content:center;flex-wrap:wrap}
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:var(--space-3)}.os-label{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;opacity:.5}
.phone{width:340px;height:720px;border-radius:46px;position:relative;overflow:hidden;background:var(--bg);transition:background var(--dur-theme) ease;box-shadow:0 0 0 11px #1a1a1c,0 0 0 13px #2c2c2e,0 36px 70px -20px rgba(20,20,40,.55)}
.status{position:absolute;top:0;left:0;right:0;height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;font-size:14px;font-weight:600;color:var(--ink);z-index:30}.status .r{display:flex;gap:6px;align-items:center}
.notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:108px;height:30px;background:#000;border-radius:18px;z-index:31}
.screen{position:absolute;inset:0;padding-top:50px;display:flex;flex-direction:column;overflow:hidden}
.page-head{position:relative;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) var(--space-5) var(--space-2)}
.page-title{font-family:var(--serif);font-size:26px;font-weight:600;letter-spacing:-.02em;color:var(--ink)}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--brand-soft);border:1.5px solid var(--brand);display:grid;place-items:center;font-size:13px;font-weight:700;color:var(--brand);cursor:pointer}
.content{position:relative;z-index:5;flex:1;overflow-y:auto;scrollbar-width:none;padding:0 var(--space-5) 90px}.content::-webkit-scrollbar{display:none}

/* hero pig */
.hero-pig{text-align:center;padding:var(--space-3) 0 var(--space-4);margin-bottom:var(--space-3);position:relative}
.hero-pig-stage{width:150px;height:130px;margin:0 auto var(--space-2);display:flex;align-items:center;justify-content:center}
.hero-pig-stage svg{width:140px;height:auto;overflow:visible}
.hero-name{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--ink)}
.hero-sub{font-size:12px;color:var(--ink-2);margin-top:3px}
.hero-dots{display:flex;justify-content:center;gap:6px;margin-top:var(--space-3)}
.hero-dot{width:10px;height:10px;border-radius:50%;background:var(--hair);transition:all var(--dur-s)}
.hero-dot.filled{background:var(--cofre-gold)}
.hero-dot.current{background:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}

.pig-hop{animation:pigHop 4s cubic-bezier(.34,1.56,.64,1) infinite}
@keyframes pigHop{0%,100%{transform:translateY(0) scale(1)}12%{transform:translateY(-10px) scale(1.02)}24%{transform:translateY(0) scale(.98,1.02)}30%{transform:translateY(-3px)}38%{transform:translateY(0)}}
.eye-blink{transform-origin:center;animation:blink 5s ease-in-out infinite}
@keyframes blink{0%,93%,100%{transform:scaleY(1)}96%{transform:scaleY(.08)}}

/* counter bar */
.counter{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) 0;margin-bottom:var(--space-3)}
.counter-num{font-family:var(--serif);font-size:28px;font-weight:600;color:var(--brand);line-height:1}
.counter-label{font-size:13px;color:var(--ink-2);line-height:1.3}
.counter-label strong{color:var(--ink);font-weight:680}

/* category label */
.cat-label{font-size:10.5px;font-weight:680;letter-spacing:.14em;text-transform:lowercase;color:var(--ink-2);padding:var(--space-4) 0 var(--space-3);border-top:1px solid var(--hair);margin-top:var(--space-2)}
.cat-label:first-of-type{border-top:none;margin-top:0;padding-top:var(--space-2)}

/* badge grid */
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-3);margin-bottom:var(--space-2)}
.badge{display:flex;flex-direction:column;align-items:center;gap:6px;padding:var(--space-3) 4px;cursor:pointer;transition:transform var(--dur-s) var(--ease-spring)}
.badge:active{transform:scale(.95)}

.badge-circle{width:62px;height:62px;border-radius:50%;display:grid;place-items:center;position:relative;transition:all var(--dur-s)}
.badge-circle svg{width:28px;height:28px;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* unlocked */
.badge.done .badge-circle{border:2.5px solid var(--brand);background:var(--brand-soft);color:var(--brand)}
.badge.done .badge-circle.gold-b{border-color:var(--cofre-gold);background:rgba(232,180,90,.15);color:var(--cofre-gold-deep)}
.badge.done .badge-circle.green-b{border-color:#4EA87A;background:rgba(78,168,122,.12);color:#4EA87A}
.badge.done .badge-circle.pink-b{border-color:var(--brand-deep);background:rgba(199,65,107,.1);color:var(--brand-deep)}
.badge.done .badge-check{position:absolute;bottom:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:var(--brand);border:2px solid var(--bg);display:grid;place-items:center}
.badge.done .badge-check svg{width:10px;height:10px;stroke:#fff;stroke-width:3}

/* locked */
.badge.locked .badge-circle{border:2px solid var(--hair);background:var(--surface-2);color:var(--ink-2);opacity:.45}
.badge.locked .badge-name{opacity:.45}

.badge-name{font-size:11px;font-weight:640;color:var(--ink);text-align:center;line-height:1.25;max-width:80px}
.badge-req{font-size:9.5px;color:var(--ink-2);font-weight:500}

/* bottom nav */
.botnav{position:absolute;left:0;right:0;bottom:0;z-index:10;display:flex;align-items:center;justify-content:space-around;padding:8px 4px 14px;background:rgba(255,243,236,.92);backdrop-filter:blur(20px);border-top:1px solid var(--hair)}
body.dark .botnav{background:rgba(14,31,27,.88)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border:0;background:transparent;font:inherit;cursor:pointer;color:var(--ink-2);transition:color var(--dur-s)}
.tab svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
.tab-lbl{font-size:10px;font-weight:560;letter-spacing:.02em}.tab.on{color:var(--brand)}.tab.on .tab-lbl{font-weight:680}

.android{font-family:var(--roboto)}.ios{font-family:var(--sf)}
.ios .glasshint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:3px;background:var(--ink);opacity:.18}

.page-head,.counter,.cat-label,.badge-grid{opacity:0;animation:rise var(--dur-l) var(--ease-hig) forwards}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.page-head{animation-delay:.05s}.hero-pig{animation-delay:.1s}.counter{animation-delay:.2s}
.hero-pig{opacity:0;animation:rise var(--dur-l) var(--ease-hig) forwards}
.cat-label:nth-of-type(1){animation-delay:.28s}.badge-grid:nth-of-type(1){animation-delay:.32s}
.cat-label:nth-of-type(2){animation-delay:.38s}.badge-grid:nth-of-type(2){animation-delay:.42s}
.cat-label:nth-of-type(3){animation-delay:.48s}.badge-grid:nth-of-type(3){animation-delay:.52s}
.cat-label:nth-of-type(4){animation-delay:.58s}.badge-grid:nth-of-type(4){animation-delay:.62s}
.cat-label:nth-of-type(5){animation-delay:.68s}.badge-grid:nth-of-type(5){animation-delay:.72s}
</style>
</head>
<body>
<div class="studio-head">
  <div class="brand-block"><div class="brand-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M5 18 a7 7 0 0 1 14 0" stroke="#fff" stroke-width="2" stroke-linecap="round"/><path d="M3 18h18" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg></div><div><div class="brand-name">Better</div><div class="brand-sub">18 · Conquistas</div></div></div>
  <div class="spacer"></div>
  <button class="theme-btn" id="themeBtn"><svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></button>
</div>
<div class="stage" id="stage"></div>
<script>
const body=document.body,themeBtn=document.getElementById('themeBtn'),icon=document.getElementById('themeIcon');
const moon='<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>';
const sun='<circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
themeBtn.onclick=()=>{body.classList.toggle('dark');icon.innerHTML=body.classList.contains('dark')?moon:sun;};

const ICO={
  moon:`<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>`,
  week:`<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01"/>`,
  month:`<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14l2 2 4-4"/>`,
  quarter:`<circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>`,
  year:`<polygon points="12 2 15.1 8.3 22 9.3 17 14.1 18.2 21 12 17.8 5.8 21 7 14.1 2 9.3 8.9 8.3"/>`,
  post:`<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>`,
  posts10:`<path d="M21 12a8 8 0 0 1-11 7.4L4 21l1.6-6A8 8 0 1 1 21 12z"/>`,
  react:`<path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8z"/>`,
  breathe:`<path d="M18 16c2-1.3 3-3.5 3-6a9 9 0 0 0-18 0c0 2.5 1 4.7 3 6"/><path d="M12 4v8"/>`,
  sos3:`<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/>`,
  article:`<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>`,
  module:`<path d="M3 6.5L12 3l9 3.5L12 10z"/><path d="M3 6.5v6L12 16l9-3.5v-6"/>`,
  checkin:`<circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>`,
  streak7:`<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 15l2 2 4-4"/>`,
  know:`<circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>`,
  coin100:`<circle cx="12" cy="12" r="8"/><path d="M8 12h8M12 8v8"/>`,
  coin1k:`<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>`,
};

const BADGES=[
  {cat:'jornada',badges:[
    {id:'night',name:'Primeira Noite',req:'1 dia limpo',ico:'moon',color:'',done:true},
    {id:'week',name:'Uma Semana',req:'7 dias limpos',ico:'week',color:'',done:true},
    {id:'month',name:'Um Mês',req:'30 dias limpos',ico:'month',color:'',done:false},
    {id:'quarter',name:'Trimestre',req:'90 dias limpos',ico:'quarter',color:'gold-b',done:false},
    {id:'year',name:'Um Ano',req:'365 dias limpos',ico:'year',color:'gold-b',done:false},
  ]},
  {cat:'comunidade',badges:[
    {id:'post1',name:'Primeira Vez',req:'1 post no fórum',ico:'post',color:'pink-b',done:true},
    {id:'post10',name:'Voz Ativa',req:'10 posts',ico:'posts10',color:'pink-b',done:false},
    {id:'react50',name:'Coração Aberto',req:'50 reações dadas',ico:'react',color:'pink-b',done:false},
  ]},
  {cat:'emergência',badges:[
    {id:'sos1',name:'Respirei',req:'usar o SOS 1 vez',ico:'breathe',color:'green-b',done:true},
    {id:'sos3',name:'Sobrevivi',req:'completar 3 passos',ico:'sos3',color:'green-b',done:true},
  ]},
  {cat:'aprendizado',badges:[
    {id:'art1',name:'Curioso',req:'ler 1 artigo',ico:'article',color:'',done:true},
    {id:'mod1',name:'Estudante',req:'completar 1 módulo',ico:'module',color:'',done:false},
  ]},
  {cat:'sentimentos',badges:[
    {id:'mood1',name:'Check-in',req:'1 registro de humor',ico:'checkin',color:'gold-b',done:true},
    {id:'mood7',name:'Diário',req:'7 dias seguidos',ico:'streak7',color:'gold-b',done:false},
    {id:'mood30',name:'Autoconhecimento',req:'30 registros',ico:'know',color:'gold-b',done:false},
  ]},
  {cat:'cofre',badges:[
    {id:'c100',name:'Primeira Moeda',req:'R$ 100 preservados',ico:'coin100',color:'gold-b',done:true},
    {id:'c1k',name:'Mil Reais',req:'R$ 1.000 preservados',ico:'coin1k',color:'gold-b',done:false},
  ]},
];

const totalDone = BADGES.reduce((a,c)=>a+c.badges.filter(b=>b.done).length,0);
const totalAll = BADGES.reduce((a,c)=>a+c.badges.length,0);

function renderBadge(b){
  const cls=b.done?'done':'locked';
  const colorCls=b.color||'';
  const check=b.done?`<div class="badge-check"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div>`:'';
  return `<div class="badge ${cls}"><div class="badge-circle ${colorCls}"><svg viewBox="0 0 24 24" stroke="currentColor">${ICO[b.ico]}</svg>${check}</div><span class="badge-name">${b.name}</span><span class="badge-req">${b.req}</span></div>`;
}

function buildPhone(os){
  const isIos=os==='ios';
  let cats=BADGES.map(c=>`<div class="cat-label">${c.cat}</div><div class="badge-grid">${c.badges.map(renderBadge).join('')}</div>`).join('\n');

  return `<div class="phone-wrap"><div class="os-label">${isIos?'iOS 26 · Liquid Glass / HIG':'Android · Material 3 Expressive'}</div><div class="phone">${isIos?'<div class="notch"></div>':''}<div class="status"><span>9:41</span><span class="r"><svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><rect x="0" y="3" width="3" height="8" rx="1"/><rect x="4.5" y="1.5" width="3" height="9.5" rx="1"/><rect x="9" y="0" width="3" height="11" rx="1"/><rect x="13.5" y="0" width="3" height="11" rx="1"${isIos?'':' opacity=".3"'}/></svg><svg width="22" height="11" viewBox="0 0 24 12" fill="none" stroke="currentColor" stroke-width="1"><rect x="1" y="1" width="20" height="10" rx="2.5"/><rect x="2.5" y="2.5" width="${isIos?15:14}" height="7" rx="1.2" fill="currentColor"/><rect x="22" y="4" width="1.5" height="4" rx="1" fill="currentColor"/></svg></span></div>
<div class="screen ${os}"><div class="page-head"><h1 class="page-title">Conquistas</h1><div class="avatar">L</div></div><div class="content">
<div class="hero-pig">
<div class="hero-pig-stage">
<svg viewBox="0 0 160 140" class="pig-hop"><defs><radialGradient id="hb" cx="38%" cy="30%" r="80%"><stop offset="0%" stop-color="#E0C690"/><stop offset="100%" stop-color="#A07838"/></radialGradient></defs>
<ellipse cx="76" cy="128" rx="50" ry="6" fill="#000" opacity=".08"/>
<rect x="30" y="96" width="14" height="24" rx="6" fill="#A07838"/><rect x="110" y="96" width="14" height="24" rx="6" fill="#A07838"/>
<rect x="52" y="98" width="14" height="24" rx="6" fill="#C8A060"/><rect x="88" y="98" width="14" height="24" rx="6" fill="#C8A060"/>
<path d="M18,66 q-8,-2 -6,-10 q2,-6 7,-4" fill="none" stroke="#A07838" stroke-width="5" stroke-linecap="round"/>
<path d="M104,50 Q104,28 124,34 Q126,50 116,60 Q108,60 104,50Z" fill="#A07838"/>
<path d="M109,48 Q110,34 120,38 Q120,48 115,55Z" fill="#E0C690" opacity=".5"/>
<ellipse cx="72" cy="68" rx="56" ry="38" fill="url(#hb)"/>
<ellipse cx="124" cy="70" rx="14" ry="16" fill="#C8A060"/>
<ellipse cx="122" cy="66" rx="3" ry="2.5" fill="#A07838"/><ellipse cx="128" cy="66" rx="3" ry="2.5" fill="#A07838"/>
<rect x="44" y="30" width="36" height="8" rx="4" transform="rotate(-10 62 34)" fill="#A07838"/>
<circle class="eye-blink" cx="108" cy="56" r="4.5" fill="#3D2C1E"/><circle cx="110" cy="54" r="1.5" fill="#fff" opacity=".8"/>
<ellipse cx="50" cy="48" rx="18" ry="10" fill="#fff" opacity=".1" transform="rotate(-15 50 48)"/>
<circle cx="34" cy="120" r="5" fill="#E0C690" stroke="#A07838" stroke-width=".8" opacity=".7"/>
</svg>
</div>
<div class="hero-name">Reconstrução</div>
<div class="hero-sub">Nível 3 de 5 · 23 dias limpos</div>
<div class="hero-dots"><span class="hero-dot filled"></span><span class="hero-dot filled"></span><span class="hero-dot current"></span><span class="hero-dot"></span><span class="hero-dot"></span></div>
</div>
<div class="counter"><span class="counter-num">${totalDone}/${totalAll}</span><span class="counter-label"><strong>conquistas</strong> desbloqueadas</span></div>
